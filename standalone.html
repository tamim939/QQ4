<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQ4 Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/10.16.4/framer-motion.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .yellow-gradient {
            background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        
        /* Hide scrollbar but allow scrolling */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <!-- Auth Page (Initially Visible) -->
    <div id="auth-page" class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden animate-fade-in">
        <div class="yellow-gradient p-12 text-center text-white relative">
            <div class="absolute top-0 right-0 w-32 h-32 bg-white opacity-10 rounded-full -mr-16 -mt-16"></div>
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white/20 backdrop-blur-md rounded-2xl mb-6 shadow-xl border border-white/30">
                <i data-lucide="gem" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tight mb-2 uppercase">QQ4</h1>
            <p class="text-white/80 font-medium tracking-wide">Premium Messenger Experience</p>
        </div>

        <div class="p-8 space-y-6">
            <h2 class="text-2xl font-bold text-gray-900 text-center">Welcome Back</h2>
            <div class="space-y-4">
                <div class="group">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1 mb-2 block">Email Address</label>
                    <input type="email" placeholder="name@example.com" class="w-full px-5 py-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none focus:border-[#f1c40f] transition-all font-bold text-gray-700">
                </div>
                <div class="group">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1 mb-2 block">Password</label>
                    <input type="password" placeholder="••••••••" class="w-full px-5 py-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none focus:border-[#f1c40f] transition-all font-bold text-gray-700">
                </div>
            </div>

            <button onclick="login()" class="w-full yellow-gradient py-5 rounded-2xl text-white font-black uppercase tracking-widest shadow-lg shadow-yellow-200 hover:scale-[1.02] active:scale-95 transition-all">
                Login Now
            </button>
            
            <p class="text-center text-xs font-bold text-gray-400">
                New user? <a href="#" class="text-[#f1c40f] border-b-2 border-[#f1c40f]/20">Create account</a>
            </p>
        </div>
    </div>

    <!-- Main Chat Page (Hidden Initially) -->
    <div id="chat-page" class="hidden fixed inset-0 bg-white flex flex-col md:flex-row overflow-hidden">
        <!-- Sidebar -->
        <div class="w-full md:w-80 border-r border-gray-100 flex flex-col bg-white">
            <div class="p-6 border-b border-gray-50 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 yellow-gradient rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-yellow-100">Q</div>
                    <h1 class="text-xl font-black text-gray-900 tracking-tight">QQ4</h1>
                </div>
                <button onclick="showProfile()" class="w-10 h-10 rounded-xl bg-gray-50 flex items-center justify-center text-gray-400 hover:text-[#f1c40f] transition-colors">
                    <i data-lucide="user" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="p-6">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                    <input type="text" placeholder="Find anyone..." class="w-full pl-12 pr-4 py-4 bg-gray-50 border-none rounded-2xl text-sm font-bold text-gray-700 focus:ring-2 focus:ring-[#f1c40f]/20 outline-none transition-all">
                </div>
            </div>

            <div class="flex-1 overflow-y-auto no-scrollbar py-2">
                <!-- User Item -->
                <div onclick="selectUser('MK WIN 25')" class="mx-4 mb-2 p-4 rounded-2xl flex items-center space-x-4 cursor-pointer hover:bg-gray-50 transition-all border border-transparent hover:border-gray-100 group">
                    <div class="w-12 h-12 bg-gray-100 rounded-2xl flex items-center justify-center relative overflow-hidden">
                        <span class="text-gray-400 text-sm font-black">MW</span>
                        <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-center mb-1">
                            <h3 class="text-sm font-black text-gray-900">MK WIN 25</h3>
                            <span class="text-[10px] text-gray-300 font-bold">12:45</span>
                        </div>
                        <p class="text-xs text-secondary-text font-bold opacity-60 truncate">Active now</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="flex-1 flex flex-col bg-slate-50 relative">
            <div id="chat-header" class="hidden p-6 bg-white border-b border-gray-100 flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <div class="w-10 h-10 bg-gray-100 rounded-xl flex items-center justify-center text-xs font-black text-gray-400">MW</div>
                    <div>
                        <h2 id="chat-name" class="text-sm font-black text-gray-900">MK WIN 25</h2>
                        <p class="text-[10px] font-bold text-green-500 uppercase tracking-widest">Online</p>
                    </div>
                </div>
            </div>

            <!-- Messages Placeholder -->
            <div class="flex-1 flex flex-col items-center justify-center text-center p-12 space-y-4">
                <div class="w-20 h-20 bg-yellow-50 rounded-full flex items-center justify-center text-[#f1c40f]">
                    <i data-lucide="message-circle" class="w-10 h-10"></i>
                </div>
                <h2 class="text-xl font-black text-gray-900">Choose a Conversation</h2>
                <p class="text-sm text-gray-400 max-w-xs font-medium uppercase tracking-widest text-[10px]">Select a user from the sidebar to start chatting</p>
            </div>

            <!-- Input (Hidden) -->
            <div id="chat-input" class="hidden p-6 bg-white border-t border-gray-100">
                <div class="max-w-4xl mx-auto flex items-center space-x-4">
                    <input type="text" placeholder="Write something amazing..." class="flex-1 px-6 py-4 bg-gray-50 border-none rounded-2xl text-sm font-bold text-gray-700 outline-none focus:ring-2 focus:ring-[#f1c40f]/20 transition-all">
                    <button class="w-14 h-14 yellow-gradient rounded-2xl flex items-center justify-center text-white shadow-lg shadow-yellow-100 hover:scale-105 active:scale-95 transition-all">
                        <i data-lucide="send" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Init Icons
        lucide.createIcons();

        function login() {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('chat-page').classList.remove('hidden');
            document.body.className = ''; // Remove centering
            document.body.classList.add('bg-white');
        }

        function selectUser(name) {
            document.getElementById('chat-header').classList.remove('hidden');
            document.getElementById('chat-input').classList.remove('hidden');
            document.getElementById('chat-name').innerText = name;
        }

        function showProfile() {
            alert('Profile Settings: Feature integrated in full version.');
        }
    </script>
</body>
</html>
